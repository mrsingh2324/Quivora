name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node -c api/src/app.js
      - run: node -c api/src/server.js
      - run: npm test
      - run: npm run build:admin
      - run: npm run build:player
